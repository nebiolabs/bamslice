name: Benchmarks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-

      - name: Run benchmarks and update history
        run: bash scripts/bench-track.sh

      - name: Generate throughput summary
        run: |
          echo "Benchmark Throughput Summary" > benchmark_summary.txt
          echo "============================" >> benchmark_summary.txt
          echo "" >> benchmark_summary.txt
          tail -n +2 benches/history/results.csv | tail -6 | while IFS=, read -r ts unix commit branch bench mean_ns stddev throughput machine; do
            echo "$bench: $throughput MiB/s ($mean_ns ns/iter)" >> benchmark_summary.txt
          done

      - name: Commit benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benches/history/results.csv benches/history/results.txt
          git diff --staged --quiet || git commit -m "📊 Update benchmark history [skip ci]"
          git push

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benches/history/results.csv
            benches/history/results.txt
            target/criterion/
          retention-days: 30

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('benchmark_summary.txt', 'utf8');
            const body = `## Benchmark Results\n\n\`\`\`\n${summary}\n\`\`\`\n\nFull details available in the workflow artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
